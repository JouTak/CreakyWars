# Административный конфиг CreakyWars
# Для настройки серверной части игры
debug:
  enabled: true

maps:
  # Список доступных карт (имена папок в директории maps/)
  available:
    - cw_test

games:
  # Максимальное количество параллельных игр
  max-parallel: 1

teams:
  # Максимальное количество игроков в команде
  max-players-per-team: 4
  # Количество команд
  count: 4

players:
  # Максимальное количество игроков в игре
  max: 16
  # Процент игроков от максимума для начала игры
  min-percent-to-start: 1

world:
  # Размер границы мира
  border-size: 100.0
  # Название мира-шаблона
  template-name: cw_test