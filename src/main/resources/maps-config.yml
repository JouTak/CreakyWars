# ========================================
# КОНФИГУРАЦИЯ КАРТ CREAKYWARS
# ========================================
#
# Формат координат: "X, Y, Z, YAW, PITCH"
#
# X, Y, Z - координаты блока
# YAW - поворот головы (0-360°):
#   0° = Юг, 90° = Запад, 180° = Север, 270° = Восток
# PITCH - наклон головы (-90 до 90):
#   0 = прямо, -90 = вверх, 90 = вниз
#
# Время суток (тики):
#   0 = 06:00 (рассвет)
#   6000 = 12:00 (полдень)
#   12000 = 18:00 (закат)
#   18000 = 00:00 (полночь)
#
# Погода: clear, rain, thunder
# ========================================

# ===== ТЕСТОВАЯ ПЛОСКАЯ КАРТА =====
cw_test:
  # Отображаемое название в игре
  display-name: "§eТестовая карта"

  # Описание карты
  description: "Плоская карта для тестирования механик"

  # Время суток (6000 = полдень)
  time-of-day: 6000

  # Погода
  weather: clear

  # ===== СПАВНЕРЫ РЕСУРСОВ =====
  resource-spawners:
    # Низкоуровневая резина (спавнится часто)
    rubber_low:
      - "0, 65, 0, 0, 0"      # Центр карты
      - "10, 65, 0, 0, 0"     # 10 блоков на восток
      - "-10, 65, 0, 0, 0"    # 10 блоков на запад
      - "0, 65, 10, 0, 0"     # 10 блоков на юг
      - "0, 65, -10, 0, 0"    # 10 блоков на север

    # Среднеуровневая резина (реже)
    rubber_mid:
      - "20, 66, 0, 0, 0"     # Дальше от центра
      - "0, 66, 20, 0, 0"

    # Высокоуровневая резина (редко)
    rubber_high:
      - "0, 70, 0, 0, 0"      # Высоко в центре

  # ===== ТОРГОВЦЫ =====
  # YAW важен - торговец смотрит в эту сторону
  trader-locations:
    - "35, 65, 0, 90, 0"      # Возле красной базы, смотрит на запад
    - "-35, 65, 0, -90, 0"    # Возле синей базы, смотрит на восток
    - "0, 65, 35, 180, 0"     # Возле зеленой базы, смотрит на север
    - "0, 65, -35, 0, 0"      # Возле желтой базы, смотрит на юг

  # ===== СПАВНЫ КОМАНД =====
  # Порядок: Команда 0 (Красные), 1 (Синие), 2 (Зелёные), 3 (Жёлтые)
  # YAW важен - игроки смотрят в направлении центра карты
  team-spawns:
    - "40, 65, 0, 90, 0"      # Красные (восток), смотрят на запад
    - "-40, 65, 0, -90, 0"    # Синие (запад), смотрят на восток
    - "0, 65, 40, 180, 0"     # Зеленые (юг), смотрят на север
    - "0, 65, -40, 0, 0"      # Желтые (север), смотрят на юг

  # ===== ЯДРА (СЕРДЦА) КОМАНД =====
  # Обычно располагаются чуть ближе к центру от спавнов команд
  core-locations:
    - "38, 65, 0, 0, 0"       # Красное ядро
    - "-38, 65, 0, 0, 0"      # Синее ядро
    - "0, 65, 38, 0, 0"       # Зеленое ядро
    - "0, 65, -38, 0, 0"      # Желтое ядро

  # Eyeblossom (центральный остров)
  eyeblossom-locations:
    - "0, 61, 0, 0, 0"
    - "1, 61, 0, 0, 0"
    - "2, 61, 0, 0, 0"
    - "3, 61, 0, 0, 0"
    - "1, 61, 1, 0, 0"
    - "2, 61, 1, 0, 0"
    - "3, 61, 1, 0, 0"
    - "4, 61, 1, 0, 0"
    - "1, 61, 2, 0, 0"
    - "2, 61, 2, 0, 0"
    - "3, 61, 2, 0, 0"
    - "4, 61, 2, 0, 0"

  # Точка спавна Скрипуна (центр острова)
  creaking-spawn: "0, 67, 0, 0, 0"


# ========================================
# КАК ДОБАВИТЬ СВОЮ КАРТУ:
# ========================================
#
# 1. Скопируйте структуру любой карты выше
# 2. Замените координаты на свои
# 3. Сохраните файл
# 4. Добавьте название карты в admin-config.yml -> maps.available
# 5. Выполните /cw reload
# 6. Готово!
#
# Для получения координат используйте:
# /cw getpos - стоя в нужном месте
#
# ========================================