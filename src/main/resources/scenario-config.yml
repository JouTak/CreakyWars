# Конфиг сценария игры CreakyWars
# Фазы игры и их параметры

phases:
  phase1:
    name: "Фаза 1: Подготовка"
    duration: 600  # в секундах
    resource-multiplier: 1.0
    respawn-enabled: true
    border-shrink: false
    border-shrink-speed: 0.0
    border-final-size: 100.0
    start-message: "Игра началась! Собирайте ресурсы и защищайте свое ядро!"
    end-message: "Фаза 1 завершена!"

  phase2:
    name: "Фаза 2: Ускорение"
    duration: 600
    resource-multiplier: 1.5
    respawn-enabled: true
    border-shrink: false
    border-shrink-speed: 0.0
    border-final-size: 100.0
    start-message: "§6§lФАЗА 2! §eРесурсы спавнятся в 1.5 раза быстрее!"
    end-message: "Фаза 2 завершена!"

  phase3:
    name: "Фаза 3: Хардкор"
    duration: 600
    resource-multiplier: 2.0
    respawn-enabled: false
    border-shrink: false
    border-shrink-speed: 0.0
    border-final-size: 100.0
    start-message: "§c§lФАЗА 3! §eВозрождение отключено!"
    end-message: "Начинается финал!"

  phase4:
    name: "Фаза 4: Финал"
    duration: 600
    resource-multiplier: 2.0
    respawn-enabled: false
    border-shrink: true
    border-shrink-speed: 0.2
    border-final-size: 40.0
    start-message: "§4§lФИНАЛ! §eГраница мира сужается!"
    end-message: "Игра завершена!"