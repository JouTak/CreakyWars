# Игровой конфиг CreakyWars

settings:
  protection-radius: 3.0  # Радиус привата точек интереса
  void-kill-height: 50
  infinite-food: true

# Блоки, которые игроки могут ломать и ставить
allowed-blocks:
  - OAK_PLANKS
  - CLAY
  - END_STONE
  - OBSIDIAN
  - WHITE_TERRACOTTA
  - RED_TERRACOTTA
  - BLUE_TERRACOTTA
  - GREEN_TERRACOTTA
  - YELLOW_TERRACOTTA
  - ORANGE_TERRACOTTA
  - MAGENTA_TERRACOTTA
  - LIGHT_BLUE_TERRACOTTA
  - LIME_TERRACOTTA
  - PINK_TERRACOTTA
  - GRAY_TERRACOTTA
  - LIGHT_GRAY_TERRACOTTA
  - CYAN_TERRACOTTA
  - PURPLE_TERRACOTTA
  - BROWN_TERRACOTTA
  - BLACK_TERRACOTTA
  - WHITE_WOOL
  - RED_WOOL
  - BLUE_WOOL
  - GREEN_WOOL
  - YELLOW_WOOL
  - ORANGE_WOOL
  - MAGENTA_WOOL
  - LIGHT_BLUE_WOOL
  - LIME_WOOL
  - PINK_WOOL
  - GRAY_WOOL
  - LIGHT_GRAY_WOOL
  - CYAN_WOOL
  - PURPLE_WOOL
  - BROWN_WOOL
  - BLACK_WOOL

day-night-cycle:
  day-duration-ticks: 6000
  night-duration-ticks: 6000
  eyeblossom-open-percent: 0.5
  creaking-aggro-radius: 60.0
  creakingBreakSpeed: 1.0

respawn:
  delay-seconds: 15
  spectator-mode: true

resources:
  # Низкоуровневая резина
  rubber_low:
    material: RESIN_CLUMP
    display-name: "§7Резина"
    spawn-period: 60 # тики
    tier: 1

  # Среднеуровневая резина
  rubber_mid:
    material: RESIN_BRICK
    display-name: "§6Прочная резина"
    spawn-period: 180
    tier: 2

  # Высокоуровневая резина
  rubber_high:
    material: NETHER_BRICK
    display-name: "§dСлишком прочная резина"
    spawn-period: 360
    tier: 3

  # Глазалия
  eyeblossom:
    material: OPEN_EYEBLOSSOM
    display-name: "§2Открытая глазалия"
    spawn-period: -1  # Не спавнится автоматически
    tier: 2

