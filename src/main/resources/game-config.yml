# Игровой конфиг CreakyWars
# Настройки ресурсов и торговли

day-night-cycle:
  day-duration-ticks: 6000
  night-duration-ticks: 6000
  eyeblossom-open-percent: 0.5
  creaking-aggro-radius: 30.0

respawn:
  delay-seconds: 15
  spectator-mode: true

resources:
  # Низкоуровневая резина
  rubber_low:
    material: RESIN_CLUMP
    display-name: "§7Резина"
    spawn-period: 60 # тики
    tier: 1

  # Среднеуровневая резина
  rubber_mid:
    material: RESIN_BRICK
    display-name: "§6Прочная резина"
    spawn-period: 180
    tier: 2

  # Высокоуровневая резина
  rubber_high:
    material: RESIN_BRICKS
    display-name: "§dРезиновый блок"
    spawn-period: 360
    tier: 3

  # Глазалия
  eyeblossom:
    material: OPEN_EYEBLOSSOM
    display-name: "§2Открытая глазалия"
    spawn-period: -1  # Не спавнится автоматически
    tier: 2

